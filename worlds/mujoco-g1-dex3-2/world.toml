name = "MuJoCo G1 Dex3 2"
description = "Free-base Unitree G1 humanoid with dual Dex3 dexterous hands."

[runtime]
mode = "external"

[run]
command = [
  "uv", "run", "--project", "../..",
  "python", "../../server.py",
  "--scene", "models/g1/scene_hands_modified.xml",
  "--control-groups", "single",
]

# Free-base walking/balancing world: the agent controls every robot actuator,
# while the root body moves through physics and contact.

[replay]
command = [
  "uv", "run", "--project", "../..",
  "python", "../../replay.py",
  "{recording}",
  "--port", "{port}",
]

[agent]
source_workspace = true
server_source = "../../server.py"
