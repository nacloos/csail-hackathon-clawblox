name = "MuJoCo G1 Dex3 3 (DDS)"
description = "Free-base Unitree G1 controlled over the Unitree SDK2 DDS interface (deploy in sim or on the real robot)."

[runtime]
mode = "external"

# Control transport: the Unitree SDK2 DDS bus (unitree_hg LowCmd_/LowState_).
# Actuate allocates a per-run domain id (and the sandbox's network facet); the
# server reads WORLD_DDS_DOMAIN_ID / WORLD_DDS_INTERFACE. See the transport docs.
[transport]
type = "dds"

# Uses the full repo server.py (spectator, sessions, snapshot, recording) with
# its optional DDS control bridge enabled by WORLD_DDS_DOMAIN_ID. It runs in the
# same self-contained conda env the sandboxed agent uses
# (/sandbox-deps/envs/unitree-mujoco), so both speak the exact same CycloneDDS
# (0.10.2) and unitree_hg IDL — a version mismatch otherwise segfaults DDS type
# discovery. That env carries mujoco + cyclonedds + unitree_sdk2py + fastapi +
# uvicorn + h5py + viser/mjviser (the spectator).
[run]
command = [
  "bash", "-lc",
  "conda_base=$(conda info --base) && unset VIRTUAL_ENV && exec \"$conda_base/envs/unitree-mujoco/bin/python\" ../../server.py --scene models/g1/scene_hands_modified.xml --control-groups single --no-spectator",
]

# The spectator runs as a sidecar: its own process (and tmux window), so viser's
# rendering never shares the sim's GIL and the world holds full 500Hz realtime.
# It reads WORLD_PORT from the shared env and prints its browser URL on start.
[[run.sidecar]]
name = "spectator"
command = [
  "bash", "-lc",
  "conda_base=$(conda info --base) && unset VIRTUAL_ENV && exec \"$conda_base/envs/unitree-mujoco/bin/python\" ../../spectate.py --scene models/g1/scene_hands_modified.xml",
]

[replay]
command = [
  "uv", "run", "--project", "../..",
  "python", "../../replay.py",
  "{recording}",
  "--port", "{port}",
]

[agent]
source_workspace = true
server_source = "../../server.py"
