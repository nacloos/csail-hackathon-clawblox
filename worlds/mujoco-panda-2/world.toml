name = "MuJoCo Panda 2"
description = "Franka Panda MuJoCo construction world with tripled object clusters."

[runtime]
mode = "external"

[run]
command = [
  "uv", "run", "--project", "../..",
  "python", "../../server.py",
  "--scene", "models/panda_cube/scene.xml",
]

[replay]
command = [
  "uv", "run", "--project", "../..",
  "python", "../../replay.py",
  "{recording}",
  "--port", "{port}",
]

[agent]
source_workspace = true
